<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX 조직역량 진단</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="logo-text">AX 조직역량 진단</span>
      <div id="header-progress" class="header-progress" style="display:none">
        <span id="progress-label" class="progress-label"></span>
        <div class="progress-bar-wrap">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
    </div>
  </header>

  <main id="app"></main>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script>
    /* ─── State ─────────────────────────────────────────────── */
    const state = {
      screen: 'start',   // 'start' | 'part' | 'open' | 'done'
      partIdx: 0,
      answers: {},       // { qId: 1~5 }
      openAnswers: {},   // { 'OPEN-01': '...', 'OPEN-02': '...' }
      respondentName: '',
      team: '',
      jobType: '',       // 'dev' | 'nondev'
      tenure: ''         // '1-3' | '3-5' | '5-7' | '7+'
    };

    const TEAMS = {
      nondev: ['재무회계', '인사', '마케팅', '기획', '영업', '구매/SCM', '법무/컴플라이언스', '경영지원', '기타'],
      dev:    ['프론트엔드', '백엔드', 'DevOps/인프라', '데이터', 'AI/ML', 'QA/테스트', '모바일', '기타 개발']
    };

    let _currentOrgType = null;

    function toggleOrgType(jobType) {
      const wrap = document.getElementById('team-list-wrap');
      const isOpen = wrap.style.display !== 'none';

      // 같은 버튼 재클릭 → 닫기
      if (_currentOrgType === jobType && isOpen) {
        wrap.style.display = 'none';
        _currentOrgType = null;
        _updateOrgBtns(null);
        return;
      }

      // 다른 타입으로 전환 → 상대방 버튼 선택 표시 초기화
      const other = jobType === 'dev' ? 'nondev' : 'dev';
      _resetBtnDisplay(other);

      _currentOrgType = jobType;
      _updateOrgBtns(jobType);
      _renderTeamList(jobType);
      wrap.style.display = '';
      document.getElementById('team-error').style.display = 'none';
    }

    function _updateOrgBtns(active) {
      ['nondev', 'dev'].forEach(t => {
        document.getElementById('btn-' + t).classList.toggle('active', t === active);
      });
    }

    function _resetBtnDisplay(jobType) {
      const hint = document.getElementById('hint-' + jobType);
      const sel  = document.getElementById('sel-'  + jobType);
      if (hint) hint.style.display = '';
      if (sel)  { sel.style.display = 'none'; sel.textContent = ''; }
    }

    function _closeTeamList(jobType, label) {
      document.getElementById('team-list-wrap').style.display = 'none';
      document.getElementById('hint-' + jobType).style.display = 'none';
      const sel = document.getElementById('sel-' + jobType);
      sel.textContent = '✓ ' + label;
      sel.style.display = '';
    }

    function _renderTeamList(jobType) {
      const list = document.getElementById('team-list');
      document.getElementById('team-custom-wrap').style.display = 'none';
      document.getElementById('team-custom-input').value = '';

      list.innerHTML = TEAMS[jobType].map(t => `
        <label class="team-opt-label">
          <input type="radio" name="team-select" value="${t}"
                 onchange="onTeamSelect('${t}', '${jobType}')">
          <div class="team-opt-content">
            <span class="team-opt-type ${jobType}">${jobType === 'dev' ? '개발' : '비개발'}</span>
            <span class="team-opt-name">${t}</span>
          </div>
        </label>
      `).join('');
    }

    function onTeamSelect(teamName, jobType) {
      const isCustom = teamName === '기타' || teamName === '기타 개발';
      if (isCustom) {
        document.getElementById('team-custom-wrap').style.display = '';
        document.getElementById('team-custom-input').focus();
      } else {
        document.getElementById('team-custom-wrap').style.display = 'none';
        setTimeout(() => _closeTeamList(jobType, teamName), 180);
      }
      document.getElementById('team-error').style.display = 'none';
    }

    function confirmCustomTeam() {
      const input = document.getElementById('team-custom-input');
      const val = input.value.trim();
      if (!val) { input.focus(); return; }
      setTimeout(() => _closeTeamList(_currentOrgType, val), 180);
    }

    const TOTAL_SCREENS = PARTS.length + 1; // parts + open

    /* ─── Helpers ────────────────────────────────────────────── */
    function $(sel) { return document.querySelector(sel); }
    function el(tag, cls, html) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    }

    function updateProgress() {
      const wrap = $('#header-progress');
      if (state.screen === 'start' || state.screen === 'done') {
        wrap.style.display = 'none';
        return;
      }
      wrap.style.display = 'flex';

      let step, total;
      if (state.screen === 'part') {
        step = state.partIdx + 1;
        total = TOTAL_SCREENS;
      } else {
        step = TOTAL_SCREENS;
        total = TOTAL_SCREENS;
      }

      const pct = Math.round((step / total) * 100);
      $('#progress-label').textContent = `${step} / ${total}`;
      $('#progress-fill').style.width = pct + '%';
    }

    /* ─── Screens ────────────────────────────────────────────── */
    function renderStart() {
      state.screen = 'start';
      updateProgress();
      const app = $('#app');
      app.innerHTML = '';

      const wrap = el('div', 'start-wrap');
      wrap.innerHTML = `
    <div class="start-card">
      <div class="start-badge">AX Capability Assessment</div>
      <h1 class="start-title">AX 조직역량 진단</h1>
      <p class="start-desc">
        본 진단은 귀 조직의 AI 전환(AX) 역량 수준을 파악하고,<br>
        개선 방향과 다음 단계를 도출하기 위한 목적으로 설계되었습니다.
      </p>
      <div class="start-info-grid">
        <div class="start-info-item">
          <span class="info-icon">📋</span>
          <span class="info-text">객관식 <strong>32문항</strong></span>
        </div>
        <div class="start-info-item">
          <span class="info-icon">✍️</span>
          <span class="info-text">주관식 <strong>2문항</strong></span>
        </div>
        <div class="start-info-item">
          <span class="info-icon">⏱️</span>
          <span class="info-text">약 <strong>15~20분</strong></span>
        </div>
      </div>
      <div class="start-notice">
        각 문항에서 현재 조직(또는 본인)의 <strong>실제 상황</strong>에 가장 가까운 항목을 선택하십시오.<br>
        이상적인 모습이 아닌 <strong>현재 수준</strong>을 기준으로 응답해 주시기 바랍니다.
      </div>
      <div class="start-parts">
        <div class="parts-title">진단 영역</div>
        <div class="parts-list">
          ${PARTS.map(p => `<div class="part-chip"><span class="chip-id">Part ${p.id}</span> ${p.title}</div>`).join('')}
          <div class="part-chip"><span class="chip-id">Part G</span> 주관식 의견</div>
        </div>
      </div>
      <div class="start-team-wrap">
        <label class="start-name-label">소속 <span>(필수)</span></label>
        <div class="org-type-row">
          <button type="button" class="org-type-btn" id="btn-nondev" onclick="toggleOrgType('nondev')">
            <span class="org-type-badge nondev">비개발</span>
            <span class="org-type-hint" id="hint-nondev">재무회계 · 인사 · 마케팅 · 기획 등</span>
            <span class="org-selected-team" id="sel-nondev" style="display:none"></span>
          </button>
          <button type="button" class="org-type-btn" id="btn-dev" onclick="toggleOrgType('dev')">
            <span class="org-type-badge dev">개발</span>
            <span class="org-type-hint" id="hint-dev">프론트엔드 · 백엔드 · DevOps · 데이터 등</span>
            <span class="org-selected-team" id="sel-dev" style="display:none"></span>
          </button>
        </div>
        <div id="team-list-wrap" style="display:none;margin-top:12px">
          <div class="team-selector" id="team-list"></div>
          <div id="team-custom-wrap" style="display:none;margin-top:8px">
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="team-custom-input" class="start-name-input"
                     placeholder="소속 팀명을 직접 입력해 주세요" maxlength="30"
                     onkeydown="if(event.key==='Enter')confirmCustomTeam()"
                     style="margin:0">
              <button type="button" class="btn btn-primary" onclick="confirmCustomTeam()"
                      style="white-space:nowrap;padding:10px 20px;flex-shrink:0">확인</button>
            </div>
          </div>
        </div>
        <div class="team-error" id="team-error" style="display:none">소속을 선택해 주세요.</div>
      </div>
      <div class="start-name-wrap">
        <label class="start-name-label">연차 <span>(필수)</span></label>
        <div class="tenure-selector">
          <label class="tenure-opt"><input type="radio" name="tenure" value="1-3"><span class="tenure-text">1~3년차</span></label>
          <label class="tenure-opt"><input type="radio" name="tenure" value="3-5"><span class="tenure-text">3~5년차</span></label>
          <label class="tenure-opt"><input type="radio" name="tenure" value="5-7"><span class="tenure-text">5~7년차</span></label>
          <label class="tenure-opt"><input type="radio" name="tenure" value="7+"><span class="tenure-text">7년차 이상</span></label>
        </div>
        <div class="team-error" id="tenure-error" style="display:none">연차를 선택해 주세요.</div>
      </div>
      <div class="start-name-wrap">
        <label class="start-name-label" for="respondent-name">이름 <span>(선택)</span></label>
        <input type="text" class="start-name-input" id="respondent-name" placeholder="응답자 이름을 입력하세요" maxlength="20">
      </div>
      <button class="btn btn-start-main" onclick="startAssessment()">진단 시작하기</button>
    </div>
  `;
      app.appendChild(wrap);
    }

    function startAssessment() {
      const teamSelected = document.querySelector('input[name="team-select"]:checked');
      const tenureSelected = document.querySelector('input[name="tenure"]:checked');

      if (!_currentOrgType || !teamSelected) {
        document.getElementById('team-error').style.display = 'block';
        return;
      }

      let teamName = teamSelected.value;
      if (teamName === '기타' || teamName === '기타 개발') {
        const custom = document.getElementById('team-custom-input').value.trim();
        if (!custom) {
          const err = document.getElementById('team-error');
          err.textContent = '팀명을 직접 입력해 주세요.';
          err.style.display = 'block';
          return;
        }
        teamName = custom;
      }

      if (!tenureSelected) {
        document.getElementById('tenure-error').style.display = 'block';
        return;
      }

      state.jobType = _currentOrgType;
      state.team = teamName;
      state.tenure = tenureSelected.value;
      const nameInput = document.getElementById('respondent-name');
      state.respondentName = nameInput ? nameInput.value.trim() : '';
      state.partIdx = 0;
      renderPart();
    }

    function renderPart() {
      state.screen = 'part';
      updateProgress();

      const part = PARTS[state.partIdx];
      const app = $('#app');
      app.innerHTML = '';

      const wrap = el('div', 'part-wrap');

      // Part header
      const header = el('div', 'part-header');
      header.innerHTML = `
    <div class="part-label">Part ${part.id}</div>
    <h2 class="part-title">${part.title}</h2>
    <p class="part-desc">${part.desc}</p>
  `;
      wrap.appendChild(header);

      // Questions
      const qList = el('div', 'q-list');
      part.questions.forEach((q, qi) => {
        const eff = (state.jobType === 'dev' && q.dev) ? { ...q, ...q.dev } : q;

        const card = el('div', 'q-card');
        card.setAttribute('data-qid', eff.id);

        const qNum = el('div', 'q-num', `Q${qi + 1}`);
        const qTitle = el('div', 'q-title', eff.title);

        card.appendChild(qNum);
        card.appendChild(qTitle);

        if (eff.type === 'maturity') {
          const qText = el('p', 'q-text', eff.q);
          card.appendChild(qText);

          const opts = el('div', 'opts');
          eff.opts.forEach((opt, i) => {
            const val = i + 1;
            const label = el('label', 'opt');
            const checked = state.answers[eff.id] === val ? 'checked' : '';
            label.innerHTML = `
          <input type="radio" name="${eff.id}" value="${val}" ${checked}>
          <span class="opt-marker">${['①', '②', '③', '④', '⑤'][i]}</span>
          <span class="opt-text">${opt}</span>
        `;
            label.querySelector('input').addEventListener('change', () => {
              state.answers[eff.id] = val;
              clearError(eff.id);
            });
            opts.appendChild(label);
          });
          card.appendChild(opts);

        } else { // likert
          const stmt = el('p', 'q-stmt', eff.stmt);
          card.appendChild(stmt);

          const likertWrap = el('div', 'likert-wrap');
          const likertOpts = el('div', 'likert-opts');
          LIKERT_LABELS.forEach((lbl, i) => {
            const val = i + 1;
            const col = el('div', 'likert-col');
            const checked = state.answers[eff.id] === val ? 'checked' : '';
            col.innerHTML = `
          <input type="radio" id="${eff.id}-${val}" name="${eff.id}" value="${val}" ${checked}>
          <label for="${eff.id}-${val}" class="likert-label">${lbl}</label>
        `;
            col.querySelector('input').addEventListener('change', () => {
              state.answers[eff.id] = val;
              clearError(eff.id);
            });
            likertOpts.appendChild(col);
          });
          likertWrap.appendChild(likertOpts);
          card.appendChild(likertWrap);
        }

        const errMsg = el('div', 'err-msg', '');
        errMsg.id = `err-${eff.id}`;
        errMsg.style.display = 'none';
        card.appendChild(errMsg);

        qList.appendChild(card);
      });
      wrap.appendChild(qList);

      // Navigation
      const nav = el('div', 'nav-bar');
      const leftBtn = el('button', 'btn btn-ghost', state.partIdx === 0 ? '처음으로' : '이전');
      leftBtn.addEventListener('click', () => {
        if (state.partIdx === 0) renderStart();
        else { state.partIdx--; renderPart(); }
      });

      const isLast = state.partIdx === PARTS.length - 1;
      const rightBtn = el('button', 'btn btn-primary', isLast ? '다음 (주관식)' : '다음');
      rightBtn.addEventListener('click', () => {
        if (!validatePart(part)) return;
        if (isLast) renderOpen();
        else { state.partIdx++; renderPart(); }
      });

      nav.appendChild(leftBtn);

      const navRight = el('div', 'nav-right');
      navRight.appendChild(rightBtn);
      nav.appendChild(navRight);
      wrap.appendChild(nav);

      app.appendChild(wrap);
      window.scrollTo(0, 0);
    }

    function validatePart(part) {
      let valid = true;
      part.questions.forEach(q => {
        if (state.answers[q.id] === undefined) {
          showError(q.id, '응답을 선택해 주세요.');
          valid = false;
        }
      });
      if (!valid) {
        // Scroll to first unanswered
        const firstErr = document.querySelector('.err-msg[style="display: block;"]') ||
          document.querySelector('.err-msg:not([style*="none"])');
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      return valid;
    }

    function showError(qid, msg) {
      const el = document.getElementById(`err-${qid}`);
      if (el) { el.textContent = msg; el.style.display = 'block'; }
      const card = document.querySelector(`[data-qid="${qid}"]`);
      if (card) card.classList.add('has-error');
    }

    function clearError(qid) {
      const el = document.getElementById(`err-${qid}`);
      if (el) { el.textContent = ''; el.style.display = 'none'; }
      const card = document.querySelector(`[data-qid="${qid}"]`);
      if (card) card.classList.remove('has-error');
    }

    function renderOpen() {
      state.screen = 'open';
      updateProgress();

      const app = $('#app');
      app.innerHTML = '';

      const wrap = el('div', 'part-wrap');

      const header = el('div', 'part-header');
      header.innerHTML = `
    <div class="part-label">Part G</div>
    <h2 class="part-title">주관식 의견</h2>
    <p class="part-desc">아래 질문에 자유롭게 응답해 주십시오. (선택 사항)</p>
  `;
      wrap.appendChild(header);

      const qList = el('div', 'q-list');
      OPEN_QUESTIONS.forEach((q, qi) => {
        const card = el('div', 'open-card');
        card.innerHTML = `
      <div class="q-num">Q${qi + 1}</div>
      <p class="q-text">${q.q}</p>
      <textarea class="open-textarea" id="open-${q.id}" rows="5" placeholder="자유롭게 입력해 주세요.">${state.openAnswers[q.id] || ''}</textarea>
    `;
        qList.appendChild(card);
      });
      wrap.appendChild(qList);

      // Nav
      const nav = el('div', 'nav-bar');
      const backBtn = el('button', 'btn btn-ghost', '이전');
      backBtn.addEventListener('click', () => {
        state.partIdx = PARTS.length - 1;
        renderPart();
      });

      const submitBtn = el('button', 'btn btn-success', '결과 확인하기');
      submitBtn.addEventListener('click', () => {
        OPEN_QUESTIONS.forEach(q => {
          const ta = document.getElementById(`open-${q.id}`);
          state.openAnswers[q.id] = ta ? ta.value.trim() : '';
        });
        submitAndRedirect();
      });

      nav.appendChild(backBtn);
      const navRight = el('div', 'nav-right');
      navRight.appendChild(submitBtn);
      nav.appendChild(navRight);
      wrap.appendChild(nav);

      app.appendChild(wrap);
      window.scrollTo(0, 0);
    }

    async function submitAndRedirect() {
      const btn = document.querySelector('.btn-success');
      if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

      const payload = {
        name: state.respondentName || '익명',
        team: state.team,
        jobType: state.jobType,
        tenure: state.tenure,
        answers: state.answers,
        openAnswers: state.openAnswers,
        timestamp: Date.now()
      };

      const existing = JSON.parse(localStorage.getItem('ax_results') || '[]');
      existing.push(payload);
      localStorage.setItem('ax_results', JSON.stringify(existing));
      localStorage.setItem('ax_result', JSON.stringify(payload));

      if (SHEETS_API_URL !== 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
        await new Promise((resolve) => {
          const cbName = '__axSave' + Date.now();
          const script = document.createElement('script');
          const timer = setTimeout(() => { cleanup(); resolve(); }, 8000);
          function cleanup() {
            delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }
          window[cbName] = () => { clearTimeout(timer); cleanup(); resolve(); };
          script.onerror = () => { clearTimeout(timer); cleanup(); resolve(); };
          script.src = SHEETS_API_URL
            + '?action=save&callback=' + cbName
            + '&data=' + encodeURIComponent(JSON.stringify(payload))
            + '&t=' + Date.now();
          document.head.appendChild(script);
        });
      }

      window.location.href = 'result.html';
    }

    /* ─── Init ───────────────────────────────────────────────── */
    renderStart();
  </script>
</body>

</html>
